<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews – GenBridge</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .reviews-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 2rem;
      padding: 2rem 0;
    }

    /* Rating Profile Card */
    .rating-profile {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 88px;
    }

    .rating-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 24px rgba(47,128,237,0.3);
    }

    .rating-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .rating-role { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.2rem; }

    .big-rating {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--text);
      font-family: 'Playfair Display', serif;
      line-height: 1;
    }

    .big-stars {
      font-size: 1.4rem;
      color: #f59e0b;
      letter-spacing: 3px;
      margin: 0.3rem 0;
    }

    .rating-count {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .rating-bars { text-align: left; }

    .rating-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.82rem;
    }

    .rating-bar-row .bar-label { width: 24px; color: var(--text-muted); flex-shrink: 0; }
    .rating-bar-track {
      flex: 1; height: 8px;
      background: var(--border);
      border-radius: 50px;
      overflow: hidden;
    }
    .rating-bar-fill { height: 100%; background: #f59e0b; border-radius: 50px; transition: width 0.6s ease; }
    .rating-bar-row .bar-count { width: 20px; color: var(--text-muted); text-align: right; }

    /* TABS */
    .rev-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1.5rem;
      background: var(--white);
      padding: 5px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: fit-content;
    }

    .rev-tab {
      padding: 0.5rem 1.1rem;
      border-radius: 9px;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .rev-tab.active { background: #fff; color: var(--blue); box-shadow: 0 2px 8px rgba(47,128,237,0.15); }

    /* REVIEW CARD */
    .review-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.6rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
      position: relative;
    }

    .review-card:hover { box-shadow: var(--shadow-lg); }

    .review-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }

    .reviewer-info { display: flex; align-items: center; gap: 10px; }

    .reviewer-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8f1fd, #c5d9f9);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; font-weight: 700; color: var(--blue-dark);
    }

    .reviewer-name { font-weight: 700; font-size: 0.95rem; }
    .reviewer-meta { font-size: 0.8rem; color: var(--text-muted); }

    .review-stars { font-size: 1.1rem; color: #f59e0b; letter-spacing: 2px; }

    .review-task-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--blue-light);
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--blue-dark);
      margin-bottom: 0.7rem;
    }

    .review-text {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.6;
      font-style: italic;
    }

    .review-text::before { content: '"'; font-size: 1.3rem; color: var(--blue); line-height: 0; vertical-align: -4px; margin-right: 2px; }
    .review-text::after { content: '"'; font-size: 1.3rem; color: var(--blue); line-height: 0; vertical-align: -4px; margin-left: 2px; }

    .review-date { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.6rem; }

    /* WRITE REVIEW CTA */
    .write-review-cta {
      background: linear-gradient(135deg, #eaf4ff, #e8f7ee);
      border: 1.5px dashed var(--blue);
      border-radius: var(--radius);
      padding: 1.8rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .write-review-cta h3 { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .write-review-cta p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 1rem; }

    /* EMPTY */
    .reviews-empty {
      text-align: center;
      padding: 3.5rem 2rem;
      color: var(--text-muted);
    }
    .reviews-empty .e-icon { font-size: 3rem; margin-bottom: 1rem; }

    .reviews-list { display: flex; flex-direction: column; gap: 1rem; }

    @media (max-width: 800px) {
      .reviews-layout { grid-template-columns: 1fr; }
      .rating-profile { position: static; }
    }
  </style>
</head>
<body>
  <div id="navbar-mount"></div>

  <div class="page-hero">
    <div class="container">
      <h1>⭐ Reviews & Ratings</h1>
      <p>See what the GenBridge community is saying</p>
    </div>
  </div>

  <div class="container">
    <div class="reviews-layout">
      <!-- SIDEBAR: RATING PROFILE -->
      <aside>
        <div class="rating-profile fade-in">
          <div class="rating-avatar" id="rp-avatar"></div>
          <div class="rating-name" id="rp-name">—</div>
          <div class="rating-role" id="rp-role">—</div>

          <div id="rp-score-section">
            <div class="big-rating" id="rp-avg">—</div>
            <div class="big-stars" id="rp-stars">☆☆☆☆☆</div>
            <div class="rating-count" id="rp-count">No reviews yet</div>
            <div class="rating-bars" id="rp-bars"></div>
          </div>
        </div>

        <div class="card fade-in fade-in-2" style="margin-top:1.2rem;background:linear-gradient(135deg,#fff3e0,#fff8f0);border-color:#ffe0b2;">
          <h3 style="font-family:'DM Sans';font-size:1rem;margin-bottom:0.5rem;">💡 How Reviews Work</h3>
          <p style="font-size:0.83rem;color:var(--text-muted);line-height:1.6;">After a task is marked complete, both the seeker and helper can leave a review. Reviews build trust in the GenBridge community.</p>
        </div>
      </aside>

      <!-- MAIN REVIEWS AREA -->
      <main>
        <!-- TABS -->
        <div class="rev-tabs fade-in" id="rev-tabs">
          <button class="rev-tab active" onclick="setRevTab('received')">⭐ Reviews I Received</button>
          <button class="rev-tab" onclick="setRevTab('given')">✏️ Reviews I Gave</button>
          <button class="rev-tab" onclick="setRevTab('all')">🌐 All Reviews</button>
        </div>

        <div id="reviews-main" class="fade-in fade-in-2"></div>
      </main>
    </div>
  </div>

  <!-- WRITE REVIEW MODAL -->
  <div class="modal-overlay" id="write-review-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>⭐ Write a Review</h2>
        <button class="modal-close" onclick="closeWriteModal()">✕</button>
      </div>

      <div class="form-group">
        <label>Select a completed task</label>
        <select id="wr-task-select">
          <option value="">-- Choose a task --</option>
        </select>
      </div>

      <div style="text-align:center;margin:1rem 0;">
        <p style="font-weight:600;margin-bottom:0.7rem;">Your rating</p>
        <div style="display:flex;justify-content:center;gap:6px;" id="wr-star-picker">
          <span data-val="1" onclick="wrSelectStar(1)" style="font-size:2.4rem;cursor:pointer;color:#d1d5db;transition:all 0.15s;">★</span>
          <span data-val="2" onclick="wrSelectStar(2)" style="font-size:2.4rem;cursor:pointer;color:#d1d5db;transition:all 0.15s;">★</span>
          <span data-val="3" onclick="wrSelectStar(3)" style="font-size:2.4rem;cursor:pointer;color:#d1d5db;transition:all 0.15s;">★</span>
          <span data-val="4" onclick="wrSelectStar(4)" style="font-size:2.4rem;cursor:pointer;color:#d1d5db;transition:all 0.15s;">★</span>
          <span data-val="5" onclick="wrSelectStar(5)" style="font-size:2.4rem;cursor:pointer;color:#d1d5db;transition:all 0.15s;">★</span>
        </div>
        <div id="wr-star-label" style="font-size:0.88rem;color:var(--text-muted);height:20px;margin-top:4px;"></div>
        <input type="hidden" id="wr-star-input" value="0"/>
      </div>

      <div class="form-group">
        <label>Your review <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <textarea id="wr-comment" placeholder="Share your experience…" rows="3"></textarea>
      </div>

      <div class="alert alert-error" id="wr-error"></div>

      <div style="display:flex;gap:1rem;">
        <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="submitWriteReview()">Submit ★</button>
        <button class="btn btn-outline" style="flex:1;justify-content:center;" onclick="closeWriteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = Auth.requireAuth();
    if (!user) throw new Error('No user');
    seedDemoTasks();
    document.getElementById('navbar-mount').innerHTML = renderNavbar('reviews');

    let activeRevTab = 'received';
    const starLabels = ['','😞 Poor','😐 Fair','🙂 Good','😊 Very Good','🤩 Excellent!'];

    // --- Build rating profile ---
    function buildProfile() {
      const initials = user.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      const avatarEl = document.getElementById('rp-avatar');
      if (user.photo) {
        avatarEl.innerHTML = `<img src="${user.photo}" alt="${initials}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.5);"/>`;
        avatarEl.style.background = 'transparent';
        avatarEl.style.boxShadow = '0 8px 24px rgba(47,128,237,0.2)';
      } else {
        avatarEl.textContent = initials;
      }
      document.getElementById('rp-name').textContent = user.name;
      document.getElementById('rp-role').textContent = user.role === 'seeker' ? '👴 Seeking Help' : '🙋 Helper';

      const myReviews = Reviews.getForUser(user.id);
      const total = myReviews.length;

      if (total === 0) {
        document.getElementById('rp-avg').textContent = '—';
        document.getElementById('rp-stars').textContent = '☆☆☆☆☆';
        document.getElementById('rp-count').textContent = 'No reviews yet';
        document.getElementById('rp-bars').innerHTML = '';
        return;
      }

      const avg = (myReviews.reduce((s,r)=>s+r.rating,0)/total).toFixed(1);
      document.getElementById('rp-avg').textContent = avg;
      document.getElementById('rp-count').textContent = `Based on ${total} review${total!==1?'s':''}`;

      // Stars
      let starsHtml = '';
      for(let i=1;i<=5;i++) starsHtml += `<span style="color:${i<=Math.round(avg)?'#f59e0b':'#d1d5db'};">★</span>`;
      document.getElementById('rp-stars').innerHTML = starsHtml;

      // Distribution bars
      let barsHtml = '';
      for(let s=5;s>=1;s--) {
        const count = myReviews.filter(r=>r.rating===s).length;
        const pct = total > 0 ? Math.round((count/total)*100) : 0;
        barsHtml += `
          <div class="rating-bar-row">
            <span class="bar-label">${s}★</span>
            <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${pct}%"></div></div>
            <span class="bar-count">${count}</span>
          </div>`;
      }
      document.getElementById('rp-bars').innerHTML = barsHtml;
    }

    // --- Render review tabs ---
    function setRevTab(tab) {
      activeRevTab = tab;
      document.querySelectorAll('.rev-tab').forEach((t,i) => {
        t.classList.toggle('active', ['received','given','all'][i] === tab);
      });
      renderReviews();
    }

    function renderReviews() {
      const main = document.getElementById('reviews-main');
      let reviews;
      if (activeRevTab === 'received') reviews = Reviews.getForUser(user.id);
      else if (activeRevTab === 'given') reviews = Reviews.getByReviewer(user.id);
      else reviews = Reviews.getAll();

      // CTA to write review
      const completedTasks = Tasks.getAll().filter(t =>
        t.status === 'completed' &&
        (String(t.postedById) === String(user.id) || String(t.acceptedById) === String(user.id)) &&
        !Reviews.hasReviewed(t.id, user.id)
      );

      let ctaHtml = '';
      if (completedTasks.length > 0 && activeRevTab !== 'all') {
        ctaHtml = `
          <div class="write-review-cta fade-in">
            <div style="font-size:2rem;margin-bottom:0.5rem;">✍️</div>
            <h3>You have ${completedTasks.length} task${completedTasks.length!==1?'s':''} awaiting review</h3>
            <p>Share your experience to help build trust in the community</p>
            <button class="btn btn-primary" onclick="openWriteModal()">Write a Review →</button>
          </div>`;
      }

      if (reviews.length === 0) {
        main.innerHTML = ctaHtml + `
          <div class="reviews-empty">
            <div class="e-icon">⭐</div>
            <p style="font-size:1rem;font-weight:600;margin-bottom:0.4rem;">No reviews yet</p>
            <p>${activeRevTab==='received' ? 'Complete tasks to start receiving reviews from the community.' : activeRevTab==='given' ? 'Leave your first review on a completed task.' : 'No reviews have been posted yet.'}</p>
          </div>`;
        return;
      }

      const cards = reviews.map((r, i) => {
        const initials = r.reviewerName.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
        const reviewerUser = Users.findById ? Users.findById(r.reviewerId) : null;
        const reviewerPhoto = reviewerUser ? reviewerUser.photo : null;
        let starsHtml = '';
        for(let s=1;s<=5;s++) starsHtml += `<span style="color:${s<=r.rating?'#f59e0b':'#d1d5db'};">★</span>`;

        return `
          <div class="review-card fade-in" style="animation-delay:${i*0.05}s">
            <div class="review-header">
              <div class="reviewer-info">
                ${reviewerPhoto
                  ? `<img src="${reviewerPhoto}" alt="${r.reviewerName}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;"/>`
                  : `<div class="reviewer-avatar">${initials}</div>`
                }
                <div>
                  <div class="reviewer-name">${r.reviewerName} ${reviewerPhoto ? '<span style="font-size:0.72rem;color:var(--green);font-weight:700;">✓</span>' : ''}</div>
                  <div class="reviewer-meta">${getTimeAgo(r.createdAt)}${activeRevTab==='all'?` → <strong>${r.revieweeName}</strong>`:''}</div>
                </div>
              </div>
              <div class="review-stars">${starsHtml}</div>
            </div>
            <div class="review-task-badge">📋 ${r.taskTitle || 'Task'}</div>
            ${r.comment ? `<div class="review-text">${r.comment}</div>` : '<div style="color:var(--text-muted);font-size:0.85rem;font-style:italic;">No written comment.</div>'}
          </div>`;
      }).join('');

      main.innerHTML = ctaHtml + `<div class="reviews-list">${cards}</div>`;
    }

    // --- Write review modal ---
    function openWriteModal() {
      const completedTasks = Tasks.getAll().filter(t =>
        t.status === 'completed' &&
        (String(t.postedById) === String(user.id) || String(t.acceptedById) === String(user.id)) &&
        !Reviews.hasReviewed(t.id, user.id)
      );

      const sel = document.getElementById('wr-task-select');
      sel.innerHTML = '<option value="">-- Choose a task --</option>' +
        completedTasks.map(t => `<option value="${t.id}">${t.title} (${t.postedBy})</option>`).join('');

      document.getElementById('wr-star-input').value = '0';
      document.getElementById('wr-comment').value = '';
      document.getElementById('wr-error').style.display = 'none';
      document.getElementById('wr-star-label').textContent = '';
      document.querySelectorAll('#wr-star-picker span').forEach(s => { s.style.color='#d1d5db'; s.style.transform=''; });
      document.getElementById('write-review-modal').classList.add('active');
    }

    function closeWriteModal() {
      document.getElementById('write-review-modal').classList.remove('active');
    }

    function wrSelectStar(val) {
      document.getElementById('wr-star-input').value = val;
      document.querySelectorAll('#wr-star-picker span').forEach(s => {
        const v = Number(s.dataset.val);
        s.style.color = v <= val ? '#f59e0b' : '#d1d5db';
        s.style.transform = v === val ? 'scale(1.35)' : 'scale(1)';
      });
      document.getElementById('wr-star-label').textContent = starLabels[val] || '';
    }

    function submitWriteReview() {
      const taskId = document.getElementById('wr-task-select').value;
      const rating = Number(document.getElementById('wr-star-input').value);
      const comment = document.getElementById('wr-comment').value.trim();
      const err = document.getElementById('wr-error');

      if (!taskId) { err.textContent = 'Please select a task.'; err.style.display='block'; return; }
      if (!rating) { err.textContent = 'Please select a star rating.'; err.style.display='block'; return; }

      const task = Tasks.getAll().find(t => Number(t.id) === Number(taskId));
      if (!task) return;

      // Determine who is being reviewed
      const revieweeId = String(task.postedById) === String(user.id)
        ? task.acceptedById : task.postedById;
      const revieweeName = String(task.postedById) === String(user.id)
        ? (task.acceptedBy || 'Helper') : task.postedBy;

      Reviews.add({
        taskId: Number(taskId),
        taskTitle: task.title,
        reviewerId: user.id,
        reviewerName: user.name,
        revieweeId,
        revieweeName,
        rating,
        comment
      });

      closeWriteModal();
      buildProfile();
      renderReviews();

      const toast = document.createElement('div');
      toast.textContent = '⭐ Review submitted! Thank you.';
      toast.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#f59e0b;color:#fff;padding:1rem 1.5rem;border-radius:12px;font-weight:600;font-size:0.9rem;z-index:999;box-shadow:0 8px 24px rgba(245,158,11,0.35);animation:fadeIn 0.3s ease';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Init
    buildProfile();
    renderReviews();
  </script>
</body>
</html>
