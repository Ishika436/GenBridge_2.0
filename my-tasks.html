<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks – GenBridge</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .my-tasks-wrapper {
      padding: 2rem 0;
    }

    .status-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1.8rem;
      background: var(--white);
      padding: 6px;
      border-radius: 14px;
      border: 1px solid var(--border);
      width: fit-content;
    }

    .status-tab {
      padding: 0.55rem 1.2rem;
      border-radius: 10px;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .status-tab.active {
      background: #fff;
      color: var(--blue);
      box-shadow: 0 2px 8px rgba(47,128,237,0.15);
    }

    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.3rem;
    }

    .task-card-full {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: all 0.2s;
      position: relative;
    }

    .task-card-full:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
    }

    .status-ribbon {
      position: absolute;
      top: 0; right: 0;
      padding: 5px 14px;
      border-radius: 0 var(--radius) 0 var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ribbon-open { background: var(--blue-light); color: var(--blue-dark); }
    .ribbon-accepted { background: #fff3e0; color: #e65100; }
    .ribbon-completed { background: var(--green-light); color: #1a7a42; }

    .task-card-full h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      padding-right: 80px;
    }

    .task-card-full .desc {
      font-size: 0.87rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 0.8rem;
    }

    .task-info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 0.8rem 0;
      font-size: 0.83rem;
      color: var(--text-muted);
    }

    .task-info-row span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0.8rem 0;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .accepted-by {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.6rem 0.8rem;
      background: var(--green-light);
      border-radius: var(--radius-sm);
      font-size: 0.87rem;
      font-weight: 600;
      color: #1a7a42;
    }

    .empty-hero {
      text-align: center;
      padding: 5rem 2rem;
    }

    .empty-hero .e-icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-hero h3 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .empty-hero p { color: var(--text-muted); margin-bottom: 1.5rem; }

    .summary-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .summary-stat {
      flex: 1;
      min-width: 120px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .summary-stat .s-icon { font-size: 1.5rem; }
    .summary-stat .s-num { font-size: 1.4rem; font-weight: 700; color: var(--blue); font-family: 'Playfair Display', serif; }
    .summary-stat .s-label { font-size: 0.78rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div id="navbar-mount"></div>

  <div class="page-hero">
    <div class="container">
      <h1 id="page-title">📋 My Tasks</h1>
      <p id="page-subtitle">Track and manage all your tasks</p>
    </div>
  </div>

  <div class="container my-tasks-wrapper">
    <!-- SUMMARY BAR -->
    <div class="summary-bar fade-in" id="summary-bar"></div>

    <!-- TABS -->
    <div class="status-tabs fade-in fade-in-2" id="status-tabs"></div>

    <!-- GRID -->
    <div id="tasks-container" class="fade-in fade-in-3"></div>
  </div>

  <!-- REVIEW MODAL -->
  <div class="modal-overlay" id="review-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>⭐ Leave a Review</h2>
        <button class="modal-close" onclick="closeReviewModal()">✕</button>
      </div>
      <p id="review-for-text" style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.2rem;"></p>
      <div style="text-align:center;margin-bottom:1.4rem;">
        <p style="font-weight:600;margin-bottom:0.6rem;">Rate your experience</p>
        <div id="star-picker" style="display:flex;justify-content:center;gap:6px;margin-bottom:0.3rem;">
          <span class="star-btn" data-val="1" onclick="selectStar(1)" style="font-size:2.2rem;cursor:pointer;color:#d1d5db;transition:color 0.1s,transform 0.1s;">★</span>
          <span class="star-btn" data-val="2" onclick="selectStar(2)" style="font-size:2.2rem;cursor:pointer;color:#d1d5db;transition:color 0.1s,transform 0.1s;">★</span>
          <span class="star-btn" data-val="3" onclick="selectStar(3)" style="font-size:2.2rem;cursor:pointer;color:#d1d5db;transition:color 0.1s,transform 0.1s;">★</span>
          <span class="star-btn" data-val="4" onclick="selectStar(4)" style="font-size:2.2rem;cursor:pointer;color:#d1d5db;transition:color 0.1s,transform 0.1s;">★</span>
          <span class="star-btn" data-val="5" onclick="selectStar(5)" style="font-size:2.2rem;cursor:pointer;color:#d1d5db;transition:color 0.1s,transform 0.1s;">★</span>
        </div>
        <div id="star-label" style="font-size:0.85rem;color:var(--text-muted);height:18px;"></div>
        <input type="hidden" id="star-input" value="0"/>
      </div>
      <div class="form-group">
        <label>Write your review <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <textarea id="review-comment" placeholder="Share your experience — was the helper punctual, kind, and helpful?" rows="3"></textarea>
      </div>
      <div id="review-error" class="alert alert-error"></div>
      <div style="display:flex;gap:1rem;">
        <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="submitReview()">Submit Review ★</button>
        <button class="btn btn-outline" style="flex:1;justify-content:center;" onclick="closeReviewModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- COMPLETE MODAL -->
  <div class="modal-overlay" id="complete-modal">
    <div class="modal" style="text-align:center;">
      <div style="font-size:3.5rem;margin-bottom:1rem;">🎊</div>
      <h2 style="margin-bottom:0.5rem;">Mark as Complete?</h2>
      <p style="color:var(--text-muted);margin-bottom:1.5rem;">Confirm that this task has been completed successfully.</p>
      <div style="display:flex;gap:1rem;justify-content:center;">
        <button class="btn btn-green" style="flex:1;justify-content:center;" onclick="confirmComplete()">✅ Mark Complete</button>
        <button class="btn btn-outline" style="flex:1;justify-content:center;" onclick="closeCompleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = Auth.requireAuth();
    if (!user) throw new Error('No user');
    seedDemoTasks();
    document.getElementById('navbar-mount').innerHTML = renderNavbar('my-tasks');

    // Setup page for role
    let activeStatus = 'all';
    let pendingCompleteId = null;

    if (user.role === 'seeker') {
      document.getElementById('page-title').textContent = '📋 My Posted Tasks';
      document.getElementById('page-subtitle').textContent = 'Manage all tasks you\'ve posted';
    } else {
      document.getElementById('page-title').textContent = '✅ My Helps';
      document.getElementById('page-subtitle').textContent = 'Tasks you\'ve accepted and helped with';
    }

    function getUserTasks() {
      if (user.role === 'seeker') {
        // FIX: use string comparison to avoid type mismatch
        return Tasks.getAll().filter(t => String(t.postedById) === String(user.id));
      } else {
        return Tasks.getAll().filter(t => String(t.acceptedById) === String(user.id));
      }
    }

    function renderSummary(tasks) {
      const total = tasks.length;
      const open = tasks.filter(t=>t.status==='open').length;
      const accepted = tasks.filter(t=>t.status==='accepted').length;
      const completed = tasks.filter(t=>t.status==='completed').length;

      document.getElementById('summary-bar').innerHTML = `
        <div class="summary-stat"><span class="s-icon">📊</span><div><div class="s-num">${total}</div><div class="s-label">Total</div></div></div>
        <div class="summary-stat"><span class="s-icon">🔵</span><div><div class="s-num">${open}</div><div class="s-label">Open</div></div></div>
        <div class="summary-stat"><span class="s-icon">🟡</span><div><div class="s-num">${accepted}</div><div class="s-label">In Progress</div></div></div>
        <div class="summary-stat"><span class="s-icon">✅</span><div><div class="s-num">${completed}</div><div class="s-label">Completed</div></div></div>
      `;
    }

    function renderTabs() {
      const tabs = [
        { key: 'all', label: '📋 All' },
        { key: 'open', label: '🔵 Open' },
        { key: 'accepted', label: '🟡 In Progress' },
        { key: 'completed', label: '✅ Completed' },
      ];
      document.getElementById('status-tabs').innerHTML = tabs.map(t =>
        `<button class="status-tab ${activeStatus===t.key?'active':''}" onclick="setTab('${t.key}')">${t.label}</button>`
      ).join('');
    }

    function setTab(status) {
      activeStatus = status;
      renderTabs();
      render();
    }

    function render() {
      let tasks = getUserTasks();
      if (activeStatus !== 'all') tasks = tasks.filter(t => t.status === activeStatus);

      renderSummary(getUserTasks());

      const container = document.getElementById('tasks-container');

      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-hero">
            <div class="e-icon">${user.role === 'seeker' ? '📝' : '🙋'}</div>
            <h3>${activeStatus === 'all' ? 'No tasks yet' : `No ${activeStatus} tasks`}</h3>
            <p>${user.role === 'seeker'
              ? 'Post your first task and helpers nearby will see it!'
              : 'Accept tasks from the "Tasks Nearby" page to start helping!'
            }</p>
            <a href="${user.role === 'seeker' ? 'post-task.html' : 'tasks-nearby.html'}" class="btn btn-primary">
              ${user.role === 'seeker' ? 'Post a Task' : 'Browse Tasks Near Me'}
            </a>
          </div>`;
        return;
      }

      const ribbonClass = { open: 'ribbon-open', accepted: 'ribbon-accepted', completed: 'ribbon-completed' };
      const ribbonLabel = { open: '⬤ Open', accepted: '⬤ In Progress', completed: '⬤ Done' };

      container.innerHTML = `<div class="tasks-grid">` + tasks.map((t, i) => `
        <div class="task-card-full fade-in" style="animation-delay:${i*0.05}s">
          <div class="status-ribbon ${ribbonClass[t.status]}">${ribbonLabel[t.status]}</div>
          <span class="badge badge-blue" style="margin-bottom:0.6rem;display:inline-block;">${t.category}</span>
          ${t.urgent ? '<span class="badge badge-orange" style="margin-left:4px;">🔴 Urgent</span>' : ''}
          <h3>${t.title}</h3>
          <p class="desc">${t.description || '—'}</p>
          <div class="task-info-row">
            <span>📍 ${t.location}</span>
            <span>💰 ${t.pay}</span>
            ${t.date ? `<span>📅 ${t.date}</span>` : ''}
          </div>

          ${t.status === 'accepted' && t.acceptedBy ? `
            <div class="divider"></div>
            <div class="accepted-by">
              ${t.acceptedByPhoto
                ? `<img src="${t.acceptedByPhoto}" alt="${t.acceptedBy}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #a8e6c0;"/>`
                : `<span>🙋</span>`
              }
              Helper: <strong>${t.acceptedBy}</strong>
              ${t.acceptedByPhoto ? `<span style="font-size:0.75rem;color:#1a7a42;font-weight:700;">✓ Verified</span>` : ''}
            </div>
          ` : ''}

          <div class="divider"></div>
          <div class="task-actions">
            ${user.role === 'seeker' && t.status === 'accepted'
              ? `<button class="btn btn-green" onclick="openCompleteModal(${t.id})" style="font-size:0.85rem;padding:0.5rem 1rem;">✅ Mark Complete</button>`
              : ''
            }
            ${user.role === 'helper' && t.status === 'accepted'
              ? `<button class="btn btn-green" onclick="openCompleteModal(${t.id})" style="font-size:0.85rem;padding:0.5rem 1rem;">✅ Mark Done</button>`
              : ''
            }
            ${user.role === 'seeker' && t.status === 'open'
              ? `<a href="tasks-nearby.html" class="btn btn-outline" style="font-size:0.85rem;padding:0.5rem 1rem;">📍 View on Board</a>`
              : ''
            }
            ${t.status === 'completed'
              ? `<span class="accepted-by" style="background:#e8f7ee;"><span>🎉</span> Task completed!</span>
                 ${!Reviews.hasReviewed(t.id, user.id)
                   ? `<button class="btn btn-outline" onclick="openReviewModal(${t.id},'${t.title.replace(/'/g,"\\'")}','${(t.acceptedBy||t.postedBy).replace(/'/g,"\\'")}','${t.acceptedById||t.postedById}')" style="font-size:0.85rem;padding:0.5rem 1rem;">⭐ Leave Review</button>`
                   : `<span class="badge badge-green" style="padding:0.45rem 0.9rem;">✅ Reviewed</span>`
                 }`
              : ''
            }
          </div>
        </div>
      `).join('') + '</div>';
    }

    function openCompleteModal(id) {
      pendingCompleteId = id;
      document.getElementById('complete-modal').classList.add('active');
    }

    function confirmComplete() {
      if (!pendingCompleteId) return;
      Tasks.updateStatus(pendingCompleteId, 'completed');
      closeCompleteModal();
      render();
    }

    function closeCompleteModal() {
      document.getElementById('complete-modal').classList.remove('active');
      pendingCompleteId = null;
    }

    // --- Review logic ---
    let pendingReview = null;
    const starLabels = ['','😞 Poor','😐 Fair','🙂 Good','😊 Very Good','🤩 Excellent!'];

    function openReviewModal(taskId, taskTitle, revieweeName, revieweeId) {
      pendingReview = { taskId, taskTitle, revieweeName, revieweeId };
      document.getElementById('review-for-text').textContent = `Reviewing: "${taskTitle}" — ${revieweeName}`;
      document.getElementById('star-input').value = '0';
      document.getElementById('review-comment').value = '';
      document.getElementById('review-error').style.display = 'none';
      document.querySelectorAll('.star-btn').forEach(s => { s.style.color = '#d1d5db'; s.style.transform = ''; });
      document.getElementById('star-label').textContent = '';
      document.getElementById('review-modal').classList.add('active');
    }

    function selectStar(val) {
      document.getElementById('star-input').value = val;
      document.querySelectorAll('.star-btn').forEach(s => {
        const v = Number(s.dataset.val);
        s.style.color = v <= val ? '#f59e0b' : '#d1d5db';
        s.style.transform = v === val ? 'scale(1.3)' : 'scale(1)';
      });
      document.getElementById('star-label').textContent = starLabels[val] || '';
    }

    function submitReview() {
      const rating = Number(document.getElementById('star-input').value);
      if (!rating) {
        const err = document.getElementById('review-error');
        err.textContent = 'Please select a star rating.';
        err.style.display = 'block';
        return;
      }
      const comment = document.getElementById('review-comment').value.trim();
      Reviews.add({
        taskId: pendingReview.taskId,
        taskTitle: pendingReview.taskTitle,
        reviewerId: user.id,
        reviewerName: user.name,
        revieweeId: pendingReview.revieweeId,
        revieweeName: pendingReview.revieweeName,
        rating,
        comment
      });
      closeReviewModal();
      render();
      const toast = document.createElement('div');
      toast.textContent = '⭐ Review submitted! Thank you.';
      toast.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#f59e0b;color:#fff;padding:1rem 1.5rem;border-radius:12px;font-weight:600;font-size:0.9rem;z-index:999;box-shadow:0 8px 24px rgba(245,158,11,0.35);animation:fadeIn 0.3s ease';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function closeReviewModal() {
      document.getElementById('review-modal').classList.remove('active');
      pendingReview = null;
    }

    renderTabs();
    render();
  </script>
</body>
</html>
